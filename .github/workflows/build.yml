name: Build enhanced-ios-hacker.dylib

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos (robust method)
        run: |
          # Instalar Theos manualmente evitando el fallback roto
          export THEOS=/Users/runner/theos
          mkdir -p $THEOS
          git clone --recursive https://github.com/theos/theos.git $THEOS

          # Descargar e instalar patched SDKs manualmente (iOS 16.5 recomendado para compatibilidad amplia)
          cd $THEOS
          curl -L -o sdks.zip https://github.com/theos/sdks/archive/refs/heads/master.zip
          unzip -q sdks.zip
          mv sdks-master/* sdks/ 2>/dev/null || true
          rm -rf sdks-master sdks.zip
          echo "✅ Patched SDKs instalados"

          # Asegurar que Xcode esté disponible
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build dylib
        working-directory: ./enhanced-ios-hacker/enhanced-ios-hacker
        env:
          THEOS: /Users/runner/theos
        run: make package

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: enhanced-ios-hacker-dylib
          path: enhanced-ios-hacker/enhanced-ios-hacker/theos/obj/enhanced-ios-hacker.dylib